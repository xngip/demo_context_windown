<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multimodal Context Demo</title>
  <link rel="stylesheet" href="/static/styles.css?v=11" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div>
          <h1>Multimodal Demo</h1>
          <p>Lịch sử hội thoại và bộ nhớ ngữ cảnh</p>
        </div>
        <button id="newChatBtn" class="primary-btn">+ Chat mới</button>
      </div>
      <div class="sidebar-tools">
        <button id="refreshBtn" class="ghost-btn">Làm mới</button>
      </div>
      <div id="conversationList" class="conversation-list"></div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <h2 id="conversationTitle">Chọn một cuộc hội thoại</h2>
          <p id="conversationMeta">Tạo chat mới hoặc chọn lịch sử bên trái</p>
        </div>
        <div class="chat-header-actions">
          <button type="button" id="deleteChatBtn" class="ghost-btn"
            style="color: var(--danger); border-color: rgba(239, 68, 68, 0.3);">Xóa Chat</button>
          <button type="button" id="memoryBtn" class="ghost-btn">Xem memory</button>
        </div>
      </header>

      <section id="statusBar" class="status-bar hidden"></section>

      <section id="messageList" class="message-list empty-state">
        <div>
          <h3>Chưa có tin nhắn</h3>
          <p>Hãy bắt đầu bằng một câu hỏi hoặc tải ảnh lên để demo quản lý ngữ cảnh đa phương thức.</p>
        </div>
      </section>

      <section id="previewBar" class="preview-bar hidden"></section>

      <form id="chatForm" class="composer">
        <div class="composer-row">
          <textarea id="messageInput"
            placeholder="Nhập câu hỏi... ví dụ: so sánh ảnh này với ảnh hôm qua hoặc tóm tắt ảnh này"
            rows="3"></textarea>
        </div>
        <div class="composer-row composer-actions">
          <div class="left-actions">
            <label class="upload-btn">
              <input id="imageInput" type="file" accept="image/*" multiple />
              <span>Chọn ảnh</span>
            </label>
            <div class="composer-hint">Enter để gửi và Shift Enter để xuống dòng</div>
          </div>
          <div class="actions-right">
            <button type="submit" id="sendBtn" class="primary-btn">Gửi</button>
          </div>
        </div>
      </form>
    </main>
  </div>

  <dialog id="memoryDialog" class="memory-dialog">
    <div class="memory-dialog-inner">
      <div class="memory-dialog-header">
        <h3>Memory Snapshot</h3>
        <button id="closeMemoryBtn" class="ghost-btn">Đóng</button>
      </div>
      <pre id="memoryContent"></pre>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/app.js?v=11"></script>
</body>

</html>
