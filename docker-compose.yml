version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: multimodal-memory-db-v2
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: multimodal_memory
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d multimodal_memory"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: multimodal-memory-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
